<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparador de Onu/Ont</title>
    <style>
        :root {
            --bg-color: #0b111e;
            --card-bg: #131c2e;
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-color: #10b981;
            --accent-hover: #059669;
            --border-color: #1e293b;
            --danger-color: #ef4444;
            --modal-overlay: rgba(0, 0, 0, 0.75);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 30px 20px;
            line-height: 1.5;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h1::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 24px;
            background-color: var(--accent-color);
            border-radius: 2px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
        }

        .actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-container {
            position: relative;
            max-width: 400px;
            width: 100%;
        }

        .search-container input {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-container input:focus {
            border-color: var(--accent-color);
        }

        .btn-compare-trigger {
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            display: none;
        }

        .btn-compare-trigger.active {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-compare-trigger:hover {
            background-color: var(--accent-hover);
        }

        .btn-compare-trigger:active {
            transform: scale(0.98);
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
            background-color: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 13px;
        }

        th {
            background-color: #0f172a;
            color: var(--text-muted);
            font-weight: 600;
            padding: 12px 14px;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }

        td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
            white-space: nowrap;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .badge-interface {
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 11px;
            display: inline-block;
            text-align: center;
        }

        .badge-interface.giga {
            background-color: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .badge-interface.mix {
            background-color: rgba(6, 182, 212, 0.2);
            color: #22d3ee;
        }

        .status-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            font-size: 11px;
            font-weight: bold;
        }

        .status-icon.check {
            background-color: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .status-icon.cross {
            background-color: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .btn-saiba-mais {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 4px 10px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 11px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .btn-saiba-mais:hover {
            background-color: var(--accent-color);
            color: #fff;
        }

        .checkbox-cell {
            text-align: center;
            width: 50px;
        }

        .checkbox-cell input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent-color);
            cursor: pointer;
        }

        .no-results {
            padding: 20px;
            text-align: center;
            color: var(--text-muted);
            display: none;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--modal-overlay);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 20px;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            width: 100%;
            max-width: 1300px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            transform: translateY(-20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.open .modal-container {
            transform: translateY(0);
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #0f172a;
            border-top-left-radius: 11px;
            border-top-right-radius: 11px;
        }

        .modal-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .btn-close-modal {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 24px;
            cursor: pointer;
            transition: color 0.2s;
            line-height: 1;
        }

        .btn-close-modal:hover {
            color: var(--danger-color);
        }

        .modal-body {
            padding: 24px;
            overflow-y: auto;
            flex: 1;
        }

        .comparison-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
        }

        .comparison-card {
            background-color: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
        }

        .comparison-card h3 {
            color: var(--accent-color);
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
            font-size: 14px;
        }

        .comparison-prop {
            margin-bottom: 10px;
            font-size: 12.5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            padding-bottom: 4px;
        }

        .comparison-prop:last-child {
            border-bottom: none;
            padding-bottom: 0;
            margin-bottom: 0;
        }

        .comparison-prop span {
            color: var(--text-muted);
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            margin-bottom: 1px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Onu/Ont</h1>
        <p>CRIADO POR: WILLIAM (SUPORTE TECNICO)</p>
    </header>

    <div class="actions-bar">
        <div class="search-container">
            <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Buscar ONU/ONT...">
        </div>
        <button id="compareBtn" class="btn-compare-trigger" onclick="openModal()">
            Comparar Selecionados (<span id="selectedCount">0</span>)
        </button>
    </div>

    <div class="table-responsive">
        <table id="equipmentsTable">
            <thead>
                <tr>
                    <th class="checkbox-cell">Selecionar</th>
                    <th>Modelo</th>
                    <th>Interface</th>
                    <th>Qtde FXS</th>
                    <th>Qtde RJ45</th>
                    <th>Sensibilidade Max | Min</th>
                    <th>Cobertura</th>
                    <th>Usuários Máx.</th>
                    <th>Datarate Máx. 2G</th>
                    <th>Datarate Máx. 5G</th>
                    <th>SSID</th>
                    <th>TR069</th>
                    <th>Customize</th>
                    <th>Remotize</th>
                    <th>Garantia</th>
                    <th>Página</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Gerado via JavaScript para garantir precisão e velocidade -->
            </tbody>
        </table>
        <div id="noResults" class="no-results">Nenhum equipamento encontrado.</div>
    </div>
</div>

<!-- Janela Modal / Popup de Comparação -->
<div id="compareModal" class="modal-overlay" onclick="closeModalViaOverlay(event)">
    <div class="modal-container">
        <div class="modal-header">
            <h2>Comparativo de ONU/ONT Selecionadas</h2>
            <button class="btn-close-modal" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body">
            <div id="comparisonGrid" class="comparison-grid"></div>
        </div>
    </div>
</div>

<script>
    // Extração precisa e fiel de todas as 20 linhas da imagem
    const onuData = [
        {"model":"AN5506-01-A","interface":"Giga","fxs":"❌","rj45":"1 porta","sensibilidade":"-8 dBm | -28 dBm","cobertura":"❌","usuarios":"❌","d2g":"❌","d5g":"❌","ssid":"❌","tr069":true,"customize":false,"remotize":false,"garantia":"1 ano"},
        {"model":"AN5506-02-B","interface":"Giga","fxs":"1 porta","rj45":"2 portas","sensibilidade":"-8 dBm | -28 dBm","cobertura":"❌","usuarios":"❌","d2g":"❌","d5g":"❌","ssid":"❌","tr069":true,"customize":false,"remotize":false,"garantia":"1 ano"},
        {"model":"ONT 140 POE","interface":"Giga","fxs":"❌","rj45":"4 portas","sensibilidade":"-8 dBm | -27 dBm","cobertura":"❌","usuarios":"❌","d2g":"❌","d5g":"❌","ssid":"❌","tr069":true,"customize":false,"remotize":false,"garantia":"1 ano"},
        {"model":"ONT HG5853SF","interface":"Giga","fxs":"2 portas","rj45":"5 portas","sensibilidade":"-9 dBm | -28 dBm","cobertura":"❌","usuarios":"64 usuários","d2g":"573 Mbps","d5g":"2400 Mbps","ssid":"8 SSIDs","tr069":true,"customize":false,"remotize":true,"garantia":"1 ano"},
        {"model":"ONT HG6145D","interface":"Giga","fxs":"❌","rj45":"2 portas","sensibilidade":"-8 dBm | -28 dBm","cobertura":"❌","usuarios":"64 usuários","d2g":"300 Mbps","d5g":"867 Mbps","ssid":"8 SSIDs","tr069":true,"customize":false,"remotize":true,"garantia":"1 ano"},
        {"model":"ONT HG6145D2","interface":"Giga","fxs":"1 porta","rj45":"4 portas","sensibilidade":"-8 dBm | -28 dBm","cobertura":"120 m²","usuarios":"64 usuários","d2g":"300 Mbps","d5g":"867 Mbps","ssid":"8 SSIDs","tr069":true,"customize":false,"remotize":true,"garantia":"1 ano"},
        {"model":"ONT HG6145F","interface":"Giga","fxs":"1 porta","rj45":"4 portas","sensibilidade":"-8 dBm | -28 dBm","cobertura":"140 m²","usuarios":"64 usuários","d2g":"573 Mbps","d5g":"1200 Mbps","ssid":"8 SSIDs","tr069":true,"customize":false,"remotize":true,"garantia":"1 ano"},
        {"model":"ONT HG6145F3","interface":"Giga","fxs":"1 porta","rj45":"4 portas","sensibilidade":"-8 dBm | -28 dBm","cobertura":"140 m²","usuarios":"64 usuários","d2g":"573 Mbps","d5g":"2400 Mbps","ssid":"8 SSIDs","tr069":true,"customize":false,"remotize":true,"garantia":"1 ano"},
        {"model":"ONU 110B","interface":"Giga","fxs":"❌","rj45":"1 porta","sensibilidade":"-7 dBm | -27 dBm","cobertura":"❌","usuarios":"❌","d2g":"❌","d5g":"❌","ssid":"❌","tr069":false,"customize":true,"remotize":false,"garantia":"1 ano"},
        {"model":"ONU R1","interface":"Giga","fxs":"❌","rj45":"1 porta","sensibilidade":"-7 dBm | -27 dBm","cobertura":"❌","usuarios":"❌","d2g":"❌","d5g":"❌","ssid":"❌","tr069":false,"customize":true,"remotize":false,"garantia":"1 ano"},
        {"model":"WIFIBER 120 AC","interface":"Giga","fxs":"❌","rj45":"2 portas","sensibilidade":"-7 dBm | -27 dBm","cobertura":"120 m²","usuarios":"64 usuários","d2g":"300 Mbps","d5g":"867 Mbps","ssid":"8 SSIDs","tr069":true,"customize":true,"remotize":true,"garantia":"1 ano"},
        {"model":"WIFIBER 1200R","interface":"Giga","fxs":"❌","rj45":"2 portas","sensibilidade":"-8 dBm | -28 dBm","cobertura":"100 m²","usuarios":"64 usuários","d2g":"300 Mbps","d5g":"867 Mbps","ssid":"10 SSIDs","tr069":true,"customize":true,"remotize":true,"garantia":"1 ano"},
        {"model":"WIFIBER 121 AC","interface":"Giga","fxs":"1 Porta","rj45":"2 portas","sensibilidade":"-7 dBm | -27 dBm","cobertura":"120 m²","usuarios":"64 usuários","d2g":"300 Mbps","d5g":"867 Mbps","ssid":"8 SSIDs","tr069":true,"customize":true,"remotize":true,"garantia":"1 ano"},
        {"model":"WIFIBER AX 1800","interface":"Giga","fxs":"❌","rj45":"4 portas","sensibilidade":"-7 dBm | -27 dBm","cobertura":"140 m²","usuarios":"64 usuários","d2g":"570 Mbps","d5g":"1200 Mbps","ssid":"10 SSIDs","tr069":true,"customize":true,"remotize":true,"garantia":"1 ano"},
        {"model":"WIFIBER AX 1800V","interface":"Giga","fxs":"1 Porta","rj45":"4 portas","sensibilidade":"-7 dBm | -27 dBm","cobertura":"140 m²","usuarios":"64 usuários","d2g":"570 Mbps","d5g":"1200 Mbps","ssid":"10 SSIDs","tr069":true,"customize":true,"remotize":true,"garantia":"1 ano"},
        {"model":"WIFIBER AX 3000V","interface":"Giga","fxs":"2 portas","rj45":"4 portas","sensibilidade":"-7 dBm | -27 dBm","cobertura":"140 m²","usuarios":"64 usuários","d2g":"576 Mbps","d5g":"2400 Mbps","ssid":"10 SSIDs","tr069":true,"customize":true,"remotize":true,"garantia":"1 ano"},
        {"model":"ONT 121W","interface":"Giga | Fast","fxs":"1 Porta","rj45":"2 portas","sensibilidade":"-7 dBm | -27 dBm","cobertura":"100 m²","usuarios":"64 usuários","d2g":"300 Mbps","d5g":"4 ssids","ssid":"4 ssids","tr069":true,"customize":true,"remotize":true,"garantia":"1 ano"},
        {"model":"ONT 142NW","interface":"Giga","fxs":"2 Portas","rj45":"4 portas","sensibilidade":"-8 dBm | -27 dBm","cobertura":"100 m²","usuarios":"64 usuários","d2g":"300 Mbps","d5g":"300 Mbps","ssid":"4 ssids","tr069":true,"customize":true,"remotize":true,"garantia":"1 ano"},
        {"model":"ONT 142NG","interface":"Giga","fxs":"2 Portas","rj45":"4 portas","sensibilidade":"-7 dBm | -27 dBm","cobertura":"100 m²","usuarios":"16 usuários/ssid","d2g":"300 Mbps","d5g":"❌","ssid":"4 ssids","tr069":true,"customize":true,"remotize":true,"garantia":"1 ano"},
        {"model":"ONU 110","interface":"Giga","fxs":"❌","rj45":"1 porta","sensibilidade":"-8 dBm | -27 dBm","cobertura":"❌","usuarios":"❌","d2g":"❌","d5g":"❌","ssid":"❌","tr069":true,"customize":true,"remotize":false,"garantia":"1 ano"}
    ];

    function renderTable() {
        const body = document.getElementById('tableBody');
        body.innerHTML = onuData.map((item, idx) => `
            <tr data-index="${idx}">
                <td class="checkbox-cell"><input type="checkbox" onchange="handleCheckboxChange()"></td>
                <td style="font-weight: 600;"><span style="color: #10b981; margin-right: 5px;">●</span> ${item.model}</td>
                <td><span class="badge-interface ${item.interface.includes('|') ? 'mix' : 'giga'}">${item.interface}</span></td>
                <td>${item.fxs}</td>
                <td>${item.rj45}</td>
                <td>${item.sensibilidade}</td>
                <td>${item.cobertura}</td>
                <td>${item.usuarios}</td>
                <td>${item.d2g}</td>
                <td>${item.d5g}</td>
                <td>${item.ssid}</td>
                <td style="text-align: center;"><span class="status-icon ${item.tr069 ? 'check' : 'cross'}">${item.tr069 ? '✓' : '✕'}</span></td>
                <td style="text-align: center;"><span class="status-icon ${item.customize ? 'check' : 'cross'}">${item.customize ? '✓' : '✕'}</span></td>
                <td style="text-align: center;"><span class="status-icon ${item.remotize ? 'check' : 'cross'}">${item.remotize ? '✓' : '✕'}</span></td>
                <td>${item.garantia}</td>
                <td><a href="#" class="btn-saiba-mais">Saiba mais ↗</a></td>
            </tr>
        `).join('');
    }

    function filterTable() {
        const input = document.getElementById('searchInput');
        const filter = input.value.toUpperCase();
        const table = document.getElementById('equipmentsTable');
        const tr = table.getElementsByTagName('tr');
        const noResults = document.getElementById('noResults');
        let visibleRows = 0;

        for (let i = 1; i < tr.length; i++) {
            const modelCell = tr[i].getElementsByTagName('td')[1];
            if (modelCell) {
                const txtValue = modelCell.textContent || modelCell.innerText;
                if (txtValue.toUpperCase().indexOf(filter) > -1) {
                    tr[i].style.display = "";
                    visibleRows++;
                } else {
                    tr[i].style.display = "none";
                }
            }
        }
        noResults.style.display = visibleRows === 0 ? "block" : "none";
    }

    function handleCheckboxChange() {
        const table = document.getElementById('equipmentsTable');
        const tr = table.getElementsByTagName('tr');
        const compareBtn = document.getElementById('compareBtn');
        const selectedCountSpan = document.getElementById('selectedCount');
        let checkedCount = 0;

        for (let i = 1; i < tr.length; i++) {
            const checkbox = tr[i].getElementsByTagName('td')[0].getElementsByTagName('input')[0];
            if (checkbox && checkbox.checked) {
                checkedCount++;
            }
        }

        selectedCountSpan.textContent = checkedCount;
        compareBtn.style.display = checkedCount > 0 ? "inline-flex" : "none";
        if(checkedCount > 0) compareBtn.classList.add('active');
    }

    function openModal() {
        const table = document.getElementById('equipmentsTable');
        const tr = table.getElementsByTagName('tr');
        const comparisonGrid = document.getElementById('comparisonGrid');
        
        comparisonGrid.innerHTML = '';

        for (let i = 1; i < tr.length; i++) {
            const checkbox = tr[i].getElementsByTagName('td')[0].getElementsByTagName('input')[0];
            if (checkbox && checkbox.checked) {
                const idx = tr[i].getAttribute('data-index');
                const item = onuData[idx];

                const card = document.createElement('div');
                card.className = 'comparison-card';
                card.innerHTML = `
                    <h3>${item.model}</h3>
                    <div class="comparison-prop"><span>Interface</span>${item.interface}</div>
                    <div class="comparison-prop"><span>Qtde FXS</span>${item.fxs}</div>
                    <div class="comparison-prop"><span>Qtde RJ45</span>${item.rj45}</div>
                    <div class="comparison-prop"><span>Sensibilidade Max | Min</span>${item.sensibilidade}</div>
                    <div class="comparison-prop"><span>Cobertura</span>${item.cobertura}</div>
                    <div class="comparison-prop"><span>Usuários Máx.</span>${item.usuarios}</div>
                    <div class="comparison-prop"><span>Datarate Máx. 2G</span>${item.d2g}</div>
                    <div class="comparison-prop"><span>Datarate Máx. 5G</span>${item.d5g}</div>
                    <div class="comparison-prop"><span>SSID</span>${item.ssid}</div>
                    <div class="comparison-prop"><span>TR069</span>${item.tr069 ? 'Sim ✓' : 'Não ✕'}</div>
                    <div class="comparison-prop"><span>Customize</span>${item.customize ? 'Sim ✓' : 'Não ✕'}</div>
                    <div class="comparison-prop"><span>Remotize</span>${item.remotize ? 'Sim ✓' : 'Não ✕'}</div>
                    <div class="comparison-prop"><span>Garantia</span>${item.garantia}</div>
                `;
                comparisonGrid.appendChild(card);
            }
        }
        document.getElementById('compareModal').classList.add('open');
    }

    function closeModal() {
        document.getElementById('compareModal').classList.remove('open');
    }

    function closeModalViaOverlay(event) {
        if (event.target.id === 'compareModal') {
            closeModal();
        }
    }

    // Inicializa a tabela ao carregar a página
    renderTable();
</script>

</body>
</html>
