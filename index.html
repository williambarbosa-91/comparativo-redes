<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Equipamentos</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }

        h1 { color: #333; margin-bottom: 30px; }

        .grid-botoes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
        }

        button {
            padding: 15px;
            font-size: 14px;
            font-weight: bold;
            color: white;
            background-color: #007bff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        button:hover {
            background-color: #0056b3;
            transform: translateY(-3px);
        }

        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Comparativo Equipamentos de Rede</h1>
    <p>CRIADO POR: WILLIAM (SUPORTE TECNICO)</p>
    
    <div class="grid-botoes">
        <button onclick="window.location.href='5g.html'">5G</button>
        <button onclick="window.location.href='cm.html'">Conversor de mídia</button>
        <button onclick="window.location.href='switchs.html'">Switchs</button>
        <button onclick="window.location.href='onuont.html'">Onu/Ont</button>
        <button onclick="window.location.href='radio.html'">Radio</button>
        <button onclick="window.location.href='roteador.html'">Roteador</button>
        <button onclick="window.location.href='sfp.html'">Gbic</button>
        <button onclick="window.location.href='wifi.html'">AP</button>
    </div>
</div>

</body>
</html>
